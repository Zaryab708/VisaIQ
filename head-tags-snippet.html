<!-- ════════════════════════════════════════════════════════════════════
     VISAIQ BRAND HEAD TAGS — copy this block into every new page
     Paste inside <head> before </head>
     Update og:url and og:title for each specific page
     ════════════════════════════════════════════════════════════════════ -->

  <!-- Favicons -->
  <link rel="icon" type="image/x-icon" href="/favicon.ico">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="manifest" href="/site.webmanifest">

  <!-- PWA / Mobile -->
  <meta name="theme-color" content="#00C896">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="VisaIQ">

  <!-- Open Graph — controls WhatsApp / LinkedIn / Facebook / iMessage preview -->
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="VisaIQ">
  <meta property="og:image" content="https://www.visaiq.com.au/og-image.jpg">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta property="og:image:alt" content="VisaIQ — Australia's Migration Intelligence Platform">

  <!-- ⬇️ UPDATE THESE TWO FOR EACH PAGE ⬇️ -->
  <meta property="og:url" content="https://www.visaiq.com.au/PAGE-SLUG-HERE">
  <meta property="og:title" content="PAGE TITLE HERE | VisaIQ">
  <meta property="og:description" content="PAGE META DESCRIPTION HERE">

  <!-- Twitter / X card -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:site" content="@visaiq">
  <meta name="twitter:image" content="https://www.visaiq.com.au/og-image.jpg">
  <meta name="twitter:title" content="PAGE TITLE HERE | VisaIQ">
  <meta name="twitter:description" content="PAGE META DESCRIPTION HERE">

<!-- ════════════════════════════════════════════════════════════════════ -->
